<!DOCTYPE html>
<html>
<head>
    <title>Orixo BG Remover</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f7fa;
        }

        h1 {
            margin-top: 50px;
            color: #333;
        }

        .upload-box {
            margin-top: 50px;
        }

        input[type="file"] {
            padding: 10px;
            border: 2px dashed #007bff;
            background: white;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Orixo BG Remover 🔥</h1>
    <p>Upload your image and remove background</p>

    <div class="upload-box">
        <input type="file">
        <br>
        <button>Upload Image</button>
    </div>

</body>
</html>
