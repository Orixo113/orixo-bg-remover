<!DOCTYPE html>
<html>
<head>
    <title>Orixo BG Remover</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 60px;
        }

        .upload-box {
            width: 350px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            color: black;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        .drop-area {
            border: 2px dashed #aaa;
            padding: 20px;
            cursor: pointer;
        }

        img {
            margin-top: 20px;
            max-width: 100%;
            display: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #4a6cf7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #loading {
            margin-top: 20px;
            display: none;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Background Remover 🔥</h1>
    <p>Upload your image and remove background</p>

    <div class="upload-box">

        <div class="drop-area">
            <input type="file" id="fileInput">
        </div>

        <button onclick="processImage()">Remove Background</button>

        <p id="loading">Processing...</p>

        <img id="preview">

    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const loading = document.getElementById("loading");

        fileInput.addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        function processImage() {
            if (!fileInput.files[0]) {
                alert("Please upload image first!");
                return;
            }

            loading.style.display = "block";

            setTimeout(() => {
                loading.innerText = "Background Removed (Demo)";
            }, 2000);
        }
    </script>

</body>
</html>
